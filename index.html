<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUESSED!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #04040e;
  --bg: #0a0a1e;
  --surface: #111130;
  --surface-light: #1a1a48;
  --border: #28285a;
  --neon-cyan: #00e5ff;
  --neon-pink: #ff2070;
  --neon-green: #00ff88;
  --neon-gold: #ffcc00;
  --neon-purple: #b44aff;
  --text: #eeeef6;
  --text-dim: #6a6a99;
  --radius: 14px;
  --radius-sm: 8px;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  overflow: hidden;
}

body { display: flex; justify-content: center; align-items: center; }

/* ───── Background effects ───── */
.bg-effects {
  position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none;
}
.bg-orb {
  position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.18;
  animation: orbFloat 10s ease-in-out infinite alternate;
}
.bg-orb:nth-child(1) { width: 500px; height: 500px; background: var(--neon-cyan); top: -15%; left: -10%; animation-delay: 0s; }
.bg-orb:nth-child(2) { width: 400px; height: 400px; background: var(--neon-pink); bottom: -10%; right: -8%; animation-delay: -4s; }
.bg-orb:nth-child(3) { width: 350px; height: 350px; background: var(--neon-purple); top: 40%; left: 55%; animation-delay: -7s; }

@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(40px, -30px) scale(1.1); }
  100% { transform: translate(-20px, 25px) scale(0.95); }
}

/* Scanlines overlay */
.bg-effects::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events: none;
}

/* ───── App & Screens ───── */
#app {
  width: 100%; height: 100%; position: relative; overflow: hidden;
}

.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 1.5rem; z-index: 1;
  animation: screenIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes screenIn {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ───── Canvas ───── */
#confetti-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 2000;
}

/* ───── Typography ───── */
.title-mega {
  font-family: 'Bungee', cursive;
  font-size: clamp(3.5rem, 10vw, 7rem);
  color: var(--neon-cyan);
  text-shadow:
    0 0 10px var(--neon-cyan),
    0 0 30px rgba(0, 229, 255, 0.5),
    0 0 60px rgba(0, 229, 255, 0.25),
    0 0 100px rgba(0, 229, 255, 0.12);
  animation: neonPulse 3s ease-in-out infinite;
  letter-spacing: 0.06em;
  user-select: none;
}

@keyframes neonPulse {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.2); }
}

.title-section {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.3rem, 3vw, 2rem);
  font-weight: 700;
  color: var(--neon-pink);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 1.5rem;
  text-shadow: 0 0 20px rgba(255, 32, 112, 0.4);
}

.subtitle {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(0.75rem, 2vw, 1rem);
  font-weight: 400;
  color: var(--text-dim);
  letter-spacing: 0.35em;
  text-transform: uppercase;
  margin-top: 0.5rem;
}

/* ───── Buttons ───── */
.btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 2px solid var(--neon-cyan);
  background: transparent;
  color: var(--neon-cyan);
  padding: 0.8rem 2.2rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.btn:hover {
  background: rgba(0, 229, 255, 0.1);
  box-shadow: 0 0 25px rgba(0, 229, 255, 0.3), inset 0 0 25px rgba(0, 229, 255, 0.05);
  transform: translateY(-2px);
}
.btn:active { transform: translateY(0); }

.btn-primary {
  background: var(--neon-cyan);
  color: var(--bg-deep);
  border-color: var(--neon-cyan);
  box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
}
.btn-primary:hover {
  background: #33ebff;
  box-shadow: 0 0 35px rgba(0, 229, 255, 0.5);
}

.btn-pink {
  border-color: var(--neon-pink);
  color: var(--neon-pink);
}
.btn-pink:hover {
  background: rgba(255, 32, 112, 0.1);
  box-shadow: 0 0 25px rgba(255, 32, 112, 0.3);
}

.btn-gold {
  border-color: var(--neon-gold);
  color: var(--neon-gold);
  background: rgba(255, 204, 0, 0.08);
}
.btn-gold:hover {
  background: rgba(255, 204, 0, 0.18);
  box-shadow: 0 0 25px rgba(255, 204, 0, 0.3);
}

.btn-start {
  font-size: 1.1rem;
  padding: 1rem 3rem;
  animation: btnGlow 2.5s ease-in-out infinite;
}
@keyframes btnGlow {
  0%, 100% { box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }
  50% { box-shadow: 0 0 40px rgba(0, 229, 255, 0.6), 0 0 80px rgba(0, 229, 255, 0.15); }
}

.btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}

.btn-sm {
  font-size: 0.7rem;
  padding: 0.45rem 1rem;
  letter-spacing: 0.08em;
}

/* ───── Inputs ───── */
.input {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  background: var(--surface);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 0.7rem 1rem;
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}
.input:focus {
  border-color: var(--neon-cyan);
  box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
}
.input::placeholder { color: var(--text-dim); font-weight: 400; }

.input-number {
  width: 90px;
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
}

/* ───── Cards & Panels ───── */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  width: 100%;
  max-width: 520px;
}

.panel-inner {
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: var(--radius-sm);
  padding: 1rem;
  margin-top: 0.75rem;
}

/* ───── Item lists ───── */
.item-list {
  list-style: none;
  max-height: 180px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.item-list::-webkit-scrollbar { width: 4px; }
.item-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.item-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 0.75rem;
  border-radius: var(--radius-sm);
  margin-bottom: 0.3rem;
  background: rgba(255,255,255,0.02);
  animation: itemIn 0.3s ease;
}
@keyframes itemIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

.item-row .name {
  font-weight: 600;
  font-size: 1.05rem;
}
.item-row .meta {
  font-size: 0.85rem;
  color: var(--text-dim);
}

.remove-btn {
  background: none; border: none; color: var(--neon-pink); cursor: pointer;
  font-size: 1.2rem; padding: 0.2rem 0.5rem; opacity: 0.6;
  transition: opacity 0.2s;
}
.remove-btn:hover { opacity: 1; }

/* ───── Row helpers ───── */
.row { display: flex; gap: 0.75rem; align-items: center; width: 100%; }
.row-center { justify-content: center; }
.gap-sm { gap: 0.5rem; }
.gap-lg { gap: 1.5rem; }
.mt-1 { margin-top: 0.75rem; }
.mt-2 { margin-top: 1.5rem; }
.mb-1 { margin-bottom: 0.75rem; }
.text-center { text-align: center; }
.flex-1 { flex: 1; }

/* ───── Splash screen ───── */
.splash-container {
  display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
}
.splash-container .subtitle { margin-bottom: 2.5rem; }

/* ───── Label row ───── */
.label {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.4rem;
}

.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 0;
}
.setting-row .label { margin-bottom: 0; }

/* ───── Game: Player bar ───── */
.player-bar {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  flex-wrap: wrap;
  margin: 0.75rem 0;
}

.player-chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0.5rem 1.2rem;
  border-radius: var(--radius);
  border: 2px solid var(--border);
  background: var(--surface);
  transition: all 0.4s ease;
  min-width: 100px;
}
.player-chip.active {
  border-color: var(--neon-cyan);
  box-shadow: 0 0 20px rgba(0, 229, 255, 0.25);
  background: rgba(0, 229, 255, 0.06);
}
.player-chip .p-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 90px;
}
.player-chip.active .p-name { color: var(--neon-cyan); }
.player-chip .p-xp {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.65rem;
  color: var(--neon-gold);
  margin-top: 0.15rem;
}
.player-chip .p-turn {
  font-size: 0.6rem;
  color: var(--neon-cyan);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-top: 0.15rem;
  opacity: 0;
  transition: opacity 0.3s;
}
.player-chip.active .p-turn { opacity: 1; }

/* ───── Game: Top bar ───── */
.game-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  max-width: 600px;
  margin-bottom: 0.5rem;
}

.round-badge {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--neon-pink);
  letter-spacing: 0.12em;
  text-shadow: 0 0 15px rgba(255, 32, 112, 0.4);
}

.guesses-badge {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}
.guesses-badge span { color: var(--neon-gold); }

/* ───── Timer ───── */
.timer-container {
  position: relative;
  width: 90px; height: 90px;
  margin: 0.5rem 0;
}
.timer-svg {
  width: 100%; height: 100%;
  transform: rotate(-90deg);
}
.timer-bg {
  fill: none;
  stroke: var(--border);
  stroke-width: 5;
}
.timer-progress {
  fill: none;
  stroke: var(--neon-cyan);
  stroke-width: 5;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear, stroke 0.5s;
  filter: drop-shadow(0 0 6px rgba(0, 229, 255, 0.5));
}
.timer-progress.danger {
  stroke: var(--neon-pink);
  filter: drop-shadow(0 0 6px rgba(255, 32, 112, 0.6));
  animation: timerPulse 0.8s ease-in-out infinite;
}
@keyframes timerPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.timer-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--text);
  letter-spacing: 0.05em;
}
.timer-text.danger { color: var(--neon-pink); }

/* ───── Tiles ───── */
.word-display {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  flex-wrap: wrap;
  margin: 1rem 0;
}

.tile {
  width: clamp(42px, 8vw, 60px);
  height: clamp(48px, 9vw, 68px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.2rem, 3vw, 1.7rem);
  font-weight: 900;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  text-transform: uppercase;
  transition: all 0.3s ease;
  user-select: none;
}

.tile.revealed {
  border-color: var(--neon-green);
  color: var(--neon-green);
  background: rgba(0, 255, 136, 0.08);
  box-shadow: 0 0 15px rgba(0, 255, 136, 0.25);
  text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
}

/* ───── Guess history ───── */
.guess-history {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  margin-top: 1rem;
  max-height: 180px;
  overflow-y: auto;
  width: 100%;
  max-width: 600px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.guess-row {
  display: flex;
  gap: 0.3rem;
  justify-content: center;
  animation: guessIn 0.4s ease;
}
@keyframes guessIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.guess-tile {
  width: clamp(30px, 5.5vw, 42px);
  height: clamp(34px, 6vw, 48px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(0.7rem, 2vw, 1rem);
  font-weight: 700;
  border-radius: 6px;
  text-transform: uppercase;
  background: var(--surface-light);
  color: var(--text-dim);
  border: 1px solid var(--border);
}

.guess-tile.correct {
  background: rgba(0, 255, 136, 0.15);
  border-color: var(--neon-green);
  color: var(--neon-green);
  box-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
}

.guess-tile.flip {
  animation: tileFlip 0.5s ease forwards;
}

@keyframes tileFlip {
  0% { transform: scaleY(1); }
  50% { transform: scaleY(0); }
  100% { transform: scaleY(1); }
}

/* ───── Guess input area ───── */
.guess-input-area {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  margin-top: 0.75rem;
  width: 100%;
  max-width: 400px;
}
.guess-input-area .input {
  text-transform: uppercase;
  letter-spacing: 0.2em;
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  text-align: center;
}

/* ───── Messages ───── */
.msg {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.85rem;
  padding: 0.4rem 0.8rem;
  border-radius: var(--radius-sm);
  margin-top: 0.5rem;
  text-align: center;
}
.msg-error {
  color: var(--neon-pink);
  background: rgba(255, 32, 112, 0.08);
  border: 1px solid rgba(255, 32, 112, 0.2);
}

/* ───── Round Intro ───── */
.round-intro {
  text-align: center;
}
.round-intro .round-num {
  font-family: 'Bungee', cursive;
  font-size: clamp(4rem, 14vw, 9rem);
  color: var(--neon-gold);
  text-shadow:
    0 0 20px rgba(255, 204, 0, 0.6),
    0 0 60px rgba(255, 204, 0, 0.3);
  animation: roundPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes roundPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}

.round-intro .round-label {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(0.9rem, 2.5vw, 1.3rem);
  font-weight: 700;
  color: var(--neon-pink);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  animation: slideUp 0.6s ease forwards;
  opacity: 0;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.round-intro .word-hint {
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  color: var(--text-dim);
  margin-top: 1rem;
  letter-spacing: 0.15em;
  animation: slideUp 0.6s ease 0.5s forwards;
  opacity: 0;
}

/* ───── Round End ───── */
.round-result-title {
  font-family: 'Bungee', cursive;
  font-size: clamp(1.8rem, 5vw, 3rem);
  margin-bottom: 0.5rem;
}
.round-result-title.win {
  color: var(--neon-green);
  text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
}
.round-result-title.lose {
  color: var(--neon-pink);
  text-shadow: 0 0 20px rgba(255, 32, 112, 0.5);
}

.answer-reveal {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.5rem, 4vw, 2.5rem);
  font-weight: 900;
  letter-spacing: 0.35em;
  color: var(--neon-gold);
  text-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
  margin: 1rem 0;
  text-transform: uppercase;
  animation: answerReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes answerReveal {
  0% { transform: scale(0) rotate(-10deg); opacity: 0; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.winner-name {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  color: var(--neon-cyan);
}
.xp-gain {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  color: var(--neon-gold);
  animation: xpFloat 1s ease forwards;
  display: inline-block;
}
@keyframes xpFloat {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  30% { opacity: 1; }
  100% { transform: translateY(-10px) scale(1.2); opacity: 1; }
}

/* ───── Final leaderboard ───── */
.leaderboard {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  margin: 1rem 0;
}

.lb-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.8rem 1.2rem;
  border-radius: var(--radius);
  border: 2px solid var(--border);
  background: var(--surface);
  animation: lbIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  opacity: 0;
  transform: translateX(-20px);
}

@keyframes lbIn {
  to { opacity: 1; transform: translateX(0); }
}

.lb-row.first {
  border-color: var(--neon-gold);
  background: rgba(255, 204, 0, 0.06);
  box-shadow: 0 0 25px rgba(255, 204, 0, 0.15);
}

.lb-rank {
  font-family: 'Bungee', cursive;
  font-size: 1.5rem;
  min-width: 42px;
  text-align: center;
}
.lb-row.first .lb-rank { color: var(--neon-gold); text-shadow: 0 0 15px rgba(255, 204, 0, 0.5); }
.lb-row:not(.first) .lb-rank { color: var(--text-dim); }

.lb-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  flex: 1;
  letter-spacing: 0.08em;
}
.lb-row.first .lb-name { color: var(--neon-gold); }

.lb-xp {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  font-weight: 900;
  color: var(--neon-gold);
}

.trophy {
  font-size: 1.8rem;
  animation: trophyBounce 1s ease infinite;
}
@keyframes trophyBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* ───── Round summary ───── */
.rounds-summary {
  width: 100%;
  max-width: 480px;
  margin-top: 1rem;
  max-height: 140px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.rs-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.4rem 0.8rem;
  font-size: 0.85rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.rs-round {
  color: var(--text-dim);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
}
.rs-word {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  color: var(--neon-cyan);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.rs-winner {
  color: var(--neon-green);
  font-weight: 600;
}
.rs-none { color: var(--text-dim); font-style: italic; }

/* ───── Scroll area ───── */
.scroll-area {
  overflow-y: auto;
  max-height: calc(100vh - 60px);
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 2rem;
}

/* ───── Error shake ───── */
.shake {
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

/* ───── Host note ───── */
.host-note {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.75rem;
  color: var(--neon-pink);
  background: rgba(255, 32, 112, 0.08);
  border: 1px solid rgba(255, 32, 112, 0.2);
  border-radius: 20px;
  padding: 0.3rem 0.8rem;
  margin-bottom: 1rem;
}

/* ───── All correct celebration ───── */
.all-correct {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1500;
  background: rgba(4, 4, 14, 0.85);
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.correct-text {
  font-family: 'Bungee', cursive;
  font-size: clamp(3rem, 10vw, 6rem);
  color: var(--neon-green);
  text-shadow:
    0 0 20px rgba(0, 255, 136, 0.7),
    0 0 60px rgba(0, 255, 136, 0.4),
    0 0 100px rgba(0, 255, 136, 0.2);
  animation: correctPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes correctPop {
  0% { transform: scale(0) rotate(-5deg); }
  100% { transform: scale(1) rotate(0); }
}

/* ───── Scrollbar styling ───── */
.scroll-area::-webkit-scrollbar { width: 4px; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="bg-effects">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<div id="app"></div>
<canvas id="confetti-canvas"></canvas>

<script>
// ═════════════════════════════════════════
// State
// ═════════════════════════════════════════
const state = {
  screen: 'splash',
  words: [],
  settings: { maxGuesses: 6, timeLimit: 60 },
  currentRound: 0,
  guessesRemaining: 0,
  timeRemaining: 0,
  revealedPositions: new Set(),
  guessHistory: [],
  roundResults: [],
  timerInterval: null,
  inputLocked: false,
};

// ═════════════════════════════════════════
// Confetti System
// ═════════════════════════════════════════
const confetti = {
  canvas: null,
  ctx: null,
  particles: [],
  running: false,
  init() {
    this.canvas = document.getElementById('confetti-canvas');
    this.ctx = this.canvas.getContext('2d');
  },
  fire() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this.particles = [];
    const colors = ['#00e5ff','#ff2070','#00ff88','#ffcc00','#b44aff','#ff8800'];
    for (let i = 0; i < 180; i++) {
      this.particles.push({
        x: Math.random() * this.canvas.width,
        y: -20 - Math.random() * 300,
        vx: (Math.random() - 0.5) * 8,
        vy: Math.random() * 4 + 2,
        size: Math.random() * 8 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * 360,
        rotV: (Math.random() - 0.5) * 12,
        wobble: Math.random() * Math.PI * 2,
        wobbleV: Math.random() * 0.08 + 0.03,
      });
    }
    this.running = true;
    this.loop();
  },
  loop() {
    if (!this.running) return;
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    let alive = 0;
    for (const p of this.particles) {
      p.x += p.vx + Math.sin(p.wobble) * 0.8;
      p.y += p.vy;
      p.vy += 0.06;
      p.rot += p.rotV;
      p.wobble += p.wobbleV;
      if (p.y < this.canvas.height + 60) {
        alive++;
        this.ctx.save();
        this.ctx.translate(p.x, p.y);
        this.ctx.rotate(p.rot * Math.PI / 180);
        this.ctx.fillStyle = p.color;
        this.ctx.globalAlpha = Math.max(0, 1 - p.y / this.canvas.height * 0.5);
        this.ctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.6);
        this.ctx.restore();
      }
    }
    if (alive > 0) requestAnimationFrame(() => this.loop());
    else { this.running = false; this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); }
  },
  stop() {
    this.running = false;
    if (this.ctx) this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
  }
};

// ═════════════════════════════════════════
// Renderers
// ═════════════════════════════════════════
function renderSplash() {
  return `
    <div class="screen">
      <div class="splash-container">
        <div class="title-mega">GUESSED!</div>
        <div class="subtitle">The Word Guessing Showdown</div>
        <button class="btn btn-primary btn-start" data-action="goto-host">START GAME</button>
      </div>
    </div>`;
}

function renderHostSetup() {
  const rows = state.words.map((w, i) => `
    <li class="item-row">
      <span class="name">Round ${i + 1}</span>
      <span class="meta">${'●'.repeat(w.length)} (${w.length} letters)</span>
      <button class="remove-btn" data-action="remove-word" data-idx="${i}">&times;</button>
    </li>`).join('');
  const canStart = state.words.length >= 1;
  return `
    <div class="screen">
      <div class="scroll-area">
        <div class="host-note">HOST ONLY &mdash; Players look away!</div>
        <div class="title-section">Game Setup</div>
        <div class="panel">
          <div class="label">Add Words (1 word = 1 round)</div>
          <div class="row">
            <input class="input flex-1" id="word-input" placeholder="Enter a word..." maxlength="20" autocomplete="off" />
            <button class="btn btn-sm" data-action="add-word">ADD</button>
          </div>
          <div class="panel-inner mt-1">
            ${state.words.length === 0
              ? '<p style="color:var(--text-dim);font-size:0.85rem;text-align:center">Add at least 1 word</p>'
              : `<ul class="item-list">${rows}</ul>`}
          </div>
        </div>
        <div class="panel mt-1">
          <div class="label mb-1">Settings</div>
          <div class="setting-row">
            <span class="label" style="margin:0">Max Guesses per Round</span>
            <input class="input input-number" id="guesses-input" type="number" min="1" max="30" value="${state.settings.maxGuesses}" />
          </div>
          <div class="setting-row">
            <span class="label" style="margin:0">Time Limit (seconds)</span>
            <input class="input input-number" id="time-input" type="number" min="10" max="300" value="${state.settings.timeLimit}" />
          </div>
        </div>
        <div class="row row-center gap-lg mt-2">
          <button class="btn btn-sm btn-pink" data-action="goto-splash">BACK</button>
          <button class="btn btn-primary btn-gold" data-action="start-game" ${canStart ? '' : 'disabled'}>START GAME</button>
        </div>
      </div>
    </div>`;
}

function renderRoundIntro() {
  const word = state.words[state.currentRound];
  return `
    <div class="screen">
      <div class="round-intro">
        <div class="round-label" style="animation-delay:0s">ROUND</div>
        <div class="round-num">${state.currentRound + 1}</div>
        <div class="round-label" style="animation-delay:0.3s">OF ${state.words.length}</div>
        <div class="word-hint">${word.length} LETTERS</div>
      </div>
    </div>`;
}

function renderPlay() {
  const word = state.words[state.currentRound];
  const circumference = 2 * Math.PI * 40;
  const progress = state.timeRemaining / state.settings.timeLimit;
  const offset = circumference * (1 - progress);
  const danger = state.timeRemaining <= 10;
  const minutes = Math.floor(state.timeRemaining / 60);
  const seconds = state.timeRemaining % 60;
  const timeStr = `${minutes}:${String(seconds).padStart(2, '0')}`;

  // Main word display
  const tiles = word.split('').map((ch, i) => {
    const isRevealed = state.revealedPositions.has(i);
    return `<div class="tile ${isRevealed ? 'revealed' : ''}">${isRevealed ? ch.toUpperCase() : ''}</div>`;
  }).join('');

  // Guess history
  const historyRows = state.guessHistory.map(g => {
    const guessTiles = g.results.map(r =>
      `<div class="guess-tile ${r.correct ? 'correct' : ''}">${r.letter.toUpperCase()}</div>`
    ).join('');
    return `<div class="guess-row">${guessTiles}</div>`;
  }).join('');

  return `
    <div class="screen">
      <div class="scroll-area" style="justify-content:flex-start;padding-top:1rem">
        <div class="game-top">
          <div class="round-badge">ROUND ${state.currentRound + 1} / ${state.words.length}</div>
          <div class="guesses-badge">GUESSES: <span>${state.guessesRemaining}</span></div>
        </div>
        <div class="timer-container">
          <svg class="timer-svg" viewBox="0 0 90 90">
            <circle class="timer-bg" cx="45" cy="45" r="40" />
            <circle class="timer-progress ${danger ? 'danger' : ''}" cx="45" cy="45" r="40"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}" />
          </svg>
          <span class="timer-text ${danger ? 'danger' : ''}">${timeStr}</span>
        </div>
        <div class="word-display">${tiles}</div>
        <div class="guess-input-area" id="input-area">
          <input class="input" id="guess-input" placeholder="${word.length} letters..."
            maxlength="${word.length}" autocomplete="off" ${state.inputLocked ? 'disabled' : ''} />
          <button class="btn btn-primary btn-sm" data-action="submit-guess" ${state.inputLocked ? 'disabled' : ''}>GUESS</button>
        </div>
        <div id="msg-area"></div>
        <div class="guess-history" id="history-area">${historyRows}</div>
      </div>
    </div>`;
}

function renderRoundEnd() {
  const result = state.roundResults[state.currentRound];
  const isWin = result.guessed;
  const isLast = state.currentRound >= state.words.length - 1;
  return `
    <div class="screen">
      <div class="scroll-area">
        <div class="round-result-title ${isWin ? 'win' : 'lose'}">${isWin ? 'GUESSED!' : 'TIME\'S UP!'}</div>
        ${isWin
          ? `<p style="font-size:1.1rem;color:var(--neon-green)">Word guessed correctly!</p>`
          : `<p style="color:var(--text-dim)">Nobody guessed the word</p>`}
        <p style="margin-top:0.75rem;color:var(--text-dim);font-size:0.85rem;font-family:'Orbitron',sans-serif;letter-spacing:0.15em">THE WORD WAS</p>
        <div class="answer-reveal">${esc(result.word)}</div>
        <div class="row row-center gap-lg mt-2">
          ${isLast
            ? `<button class="btn btn-primary btn-gold" data-action="show-final">SEE RESULTS</button>`
            : `<button class="btn btn-primary" data-action="next-round">NEXT ROUND</button>`}
        </div>
      </div>
    </div>`;
}

function renderFinal() {
  const guessedCount = state.roundResults.filter(r => r.guessed).length;
  const roundRows = state.roundResults.map((r, i) => `
    <div class="rs-row">
      <span class="rs-round">RD ${i + 1}</span>
      <span class="rs-word">${esc(r.word)}</span>
      ${r.guessed
        ? `<span class="rs-winner">Guessed</span>`
        : `<span class="rs-none">Missed</span>`}
    </div>`).join('');

  return `
    <div class="screen">
      <div class="scroll-area">
        <div class="title-mega" style="font-size:clamp(2rem,6vw,3.5rem);margin-bottom:0.25rem">GUESSED!</div>
        <div class="title-section" style="font-size:clamp(0.9rem,2vw,1.2rem)">Game Over</div>
        <p style="font-family:'Orbitron',sans-serif;font-size:1.1rem;color:var(--neon-gold);margin-bottom:1rem">
          ${guessedCount} / ${state.roundResults.length} words guessed
        </p>
        <div class="panel" style="max-width:480px">
          <div class="label mb-1">All Rounds</div>
          <div class="rounds-summary">${roundRows}</div>
        </div>
        <div class="row row-center mt-2">
          <button class="btn btn-primary btn-start" data-action="play-again">PLAY AGAIN</button>
        </div>
      </div>
    </div>`;
}

// ═════════════════════════════════════════
// Rendering engine
// ═════════════════════════════════════════
const app = document.getElementById('app');
const renderers = {
  splash: renderSplash,
  host: renderHostSetup,
  roundIntro: renderRoundIntro,
  play: renderPlay,
  roundEnd: renderRoundEnd,
  final: renderFinal,
};

function render() {
  const fn = renderers[state.screen];
  if (fn) app.innerHTML = fn();
  afterRender();
}

function afterRender() {
  // Auto-focus inputs
  const wordInput = document.getElementById('word-input');
  const guessInput = document.getElementById('guess-input');
  if (wordInput) wordInput.focus();
  if (guessInput && !state.inputLocked) guessInput.focus();

  // Enter key on inputs
  if (wordInput) wordInput.onkeydown = e => { if (e.key === 'Enter') handleAction('add-word'); };
  if (guessInput) guessInput.onkeydown = e => { if (e.key === 'Enter') handleAction('submit-guess'); };

  // Settings sync
  const gInput = document.getElementById('guesses-input');
  const tInput = document.getElementById('time-input');
  if (gInput) gInput.onchange = () => { state.settings.maxGuesses = clamp(parseInt(gInput.value) || 6, 1, 30); };
  if (tInput) tInput.onchange = () => { state.settings.timeLimit = clamp(parseInt(tInput.value) || 60, 10, 300); };
}

// ═════════════════════════════════════════
// Event delegation
// ═════════════════════════════════════════
app.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (el) handleAction(el.dataset.action, el);
});

function handleAction(action, el) {
  switch (action) {
    case 'goto-splash': setScreen('splash'); break;
    case 'goto-host': setScreen('host'); break;

    case 'add-word': {
      const input = document.getElementById('word-input');
      const word = input.value.trim().replace(/[^a-zA-Z]/g, '');
      if (!word || word.length < 2) return;
      state.words.push(word.toUpperCase());
      render();
      break;
    }

    case 'remove-word': {
      const idx = parseInt(el.dataset.idx);
      state.words.splice(idx, 1);
      render();
      break;
    }

    case 'start-game': {
      // Sync settings
      const gInput = document.getElementById('guesses-input');
      const tInput = document.getElementById('time-input');
      if (gInput) state.settings.maxGuesses = clamp(parseInt(gInput.value) || 6, 1, 30);
      if (tInput) state.settings.timeLimit = clamp(parseInt(tInput.value) || 60, 10, 300);
      startGame();
      break;
    }

    case 'submit-guess': submitGuess(); break;
    case 'next-round': startRound(state.currentRound + 1); break;
    case 'show-final': setScreen('final'); confetti.fire(); break;
    case 'play-again': resetGame(); break;
  }
}

// ═════════════════════════════════════════
// Game Logic
// ═════════════════════════════════════════
function startGame() {
  state.roundResults = [];
  startRound(0);
}

function startRound(roundIndex) {
  state.currentRound = roundIndex;
  state.guessesRemaining = state.settings.maxGuesses;
  state.timeRemaining = state.settings.timeLimit;
  state.revealedPositions = new Set();
  state.guessHistory = [];
  state.inputLocked = false;
  clearTimer();
  confetti.stop();

  // Show round intro, then transition to play
  setScreen('roundIntro');
  setTimeout(() => {
    setScreen('play');
    startTimer();
  }, 2800);
}

function submitGuess() {
  if (state.inputLocked) return;
  const input = document.getElementById('guess-input');
  if (!input) return;

  const word = state.words[state.currentRound];
  const guess = input.value.trim().replace(/[^a-zA-Z]/g, '').toUpperCase();

  if (guess.length !== word.length) {
    showMessage(`Guess must be ${word.length} letters`, 'error');
    shakeElement(document.getElementById('input-area'));
    input.value = '';
    input.focus();
    return;
  }

  state.inputLocked = true;

  // Evaluate guess
  const results = [];
  for (let i = 0; i < word.length; i++) {
    const correct = guess[i] === word[i];
    if (correct) state.revealedPositions.add(i);
    results.push({ letter: guess[i], correct });
  }

  state.guessHistory.push({ guess, results });
  state.guessesRemaining--;

  // Re-render to show the new guess and updated tiles
  render();

  // Animate the latest guess row tiles
  const historyArea = document.getElementById('history-area');
  if (historyArea) {
    const rows = historyArea.querySelectorAll('.guess-row');
    const lastRow = rows[rows.length - 1];
    if (lastRow) {
      const tiles = lastRow.querySelectorAll('.guess-tile');
      tiles.forEach((tile, i) => {
        tile.style.opacity = '0';
        tile.style.transform = 'scaleY(0)';
        setTimeout(() => {
          tile.style.transition = 'all 0.35s ease';
          tile.style.opacity = '1';
          tile.style.transform = 'scaleY(1)';
        }, 100 * i);
      });
    }
  }

  // Check outcome after animation
  const animDuration = 100 * word.length + 400;
  setTimeout(() => {
    // Check if word fully revealed
    if (state.revealedPositions.size === word.length) {
      roundWin();
      return;
    }

    // Check if out of guesses
    if (state.guessesRemaining <= 0) {
      roundLose();
      return;
    }

    state.inputLocked = false;
    render();
  }, animDuration);
}

function roundWin() {
  clearTimer();

  state.roundResults[state.currentRound] = {
    word: state.words[state.currentRound],
    guessed: true,
  };

  // Show celebration overlay
  const overlay = document.createElement('div');
  overlay.className = 'all-correct';
  overlay.innerHTML = `<div class="correct-text">GUESSED!</div>`;
  document.body.appendChild(overlay);
  confetti.fire();

  setTimeout(() => {
    overlay.remove();
    confetti.stop();
    setScreen('roundEnd');
  }, 2500);
}

function roundLose() {
  clearTimer();
  state.roundResults[state.currentRound] = {
    word: state.words[state.currentRound],
    guessed: false,
  };
  setScreen('roundEnd');
}

function resetGame() {
  clearTimer();
  confetti.stop();
  state.words = [];
  state.settings = { maxGuesses: 6, timeLimit: 60 };
  state.currentRound = 0;
  state.roundResults = [];
  state.guessHistory = [];
  state.revealedPositions = new Set();
  state.inputLocked = false;
  setScreen('splash');
}

// ═════════════════════════════════════════
// Timer
// ═════════════════════════════════════════
function startTimer() {
  clearTimer();
  state.timerInterval = setInterval(() => {
    state.timeRemaining--;
    if (state.timeRemaining <= 0) {
      state.timeRemaining = 0;
      roundLose();
      return;
    }
    updateTimerDisplay();
  }, 1000);
}

function clearTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

function updateTimerDisplay() {
  const circumference = 2 * Math.PI * 40;
  const progress = state.timeRemaining / state.settings.timeLimit;
  const offset = circumference * (1 - progress);
  const danger = state.timeRemaining <= 10;
  const minutes = Math.floor(state.timeRemaining / 60);
  const seconds = state.timeRemaining % 60;
  const timeStr = `${minutes}:${String(seconds).padStart(2, '0')}`;

  const progressEl = document.querySelector('.timer-progress');
  const textEl = document.querySelector('.timer-text');
  if (progressEl) {
    progressEl.setAttribute('stroke-dashoffset', offset);
    progressEl.classList.toggle('danger', danger);
  }
  if (textEl) {
    textEl.textContent = timeStr;
    textEl.classList.toggle('danger', danger);
  }
}

// ═════════════════════════════════════════
// Helpers
// ═════════════════════════════════════════
function setScreen(screen) {
  state.screen = screen;
  render();
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

function showMessage(text, type) {
  const area = document.getElementById('msg-area');
  if (!area) return;
  area.innerHTML = `<div class="msg msg-${type}">${esc(text)}</div>`;
  setTimeout(() => { if (area) area.innerHTML = ''; }, 2000);
}

function shakeElement(el) {
  if (!el) return;
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 500);
}

// ═════════════════════════════════════════
// Init
// ═════════════════════════════════════════
window.addEventListener('resize', () => {
  if (confetti.canvas) {
    confetti.canvas.width = window.innerWidth;
    confetti.canvas.height = window.innerHeight;
  }
});

confetti.init();
render();
</script>
</body>
</html>
